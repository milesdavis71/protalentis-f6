<div class="top-bar show-for-medium">
  <div class="top-bar-left">
    <ul class="dropdown menu" data-dropdown-menu>
      <li class="menu-text"><a href="{{routePath root 'index'}}">{{#colorSpan "primary" shade=20}}Pro Talentis Universitatis Alapítvány{{/colorSpan}}</a></li>
      <!-- <li>
        <a href="#">One</a>
        <ul class="menu vertical">
          <li><a href="#">One</a></li>
          <li><a href="#">Two</a></li>
          <li><a href="#">Three</a></li>
        </ul>
      </li> -->
      {{#each global.topBar}}
      <li{{#ifpage page subpage1 subpage2 subpage3}} class="is-active"{{/ifpage}}>
        <a href="{{routePath root url}}"{{#ifpage page subpage1 subpage2 subpage3}} aria-current="true"{{/ifpage}}>{{title}}</a>
      </li>
      {{/each}}
    </ul>
  </div>
  <div class="top-bar-right">
    <form
      class="site-search"
      role="search"
      data-site-search
      data-search-index="{{root}}assets/data/search.json"
      data-site-root="{{root}}"
    >
      <label class="show-for-sr" for="site-search-input">Keresés az oldalon</label>
      <div class="input-group">
        <input
          class="input-group-field site-search-input"
          id="site-search-input"
          type="search"
          placeholder="Keresés"
          autocomplete="off"
          aria-autocomplete="list"
          aria-controls="site-search-results"
          aria-expanded="false"
        >
        <div class="input-group-button">
          <button type="submit" class="button">Keresés</button>
        </div>
      </div>
      <div
        class="site-search-results"
        id="site-search-results"
        role="listbox"
        aria-label="Keresési találatok"
        hidden
      ></div>
    </form>
  </div>
</div>
<div class="hide-for-medium">
  <div class="title-bar mobile-nav-title" data-responsive-toggle="mobile-menu-panel" data-hide-for="medium">
    <button class="menu-icon" type="button" data-toggle="mobile-menu-panel" aria-label="Menü"></button>
    <div class="title-bar-title">Menü</div>
    <div class="mobile-nav-foundation">Pro Talentis Universitas Alapítvány</div>
  </div>
  <div class="mobile-nav-panel" id="mobile-menu-panel" data-animate="slide-in-down slide-out-up">
    {{> navigation_menu menuId="mobile-menu" menuClass="vertical menu accordion-menu" hideLogo=true}}
  </div>
</div>
