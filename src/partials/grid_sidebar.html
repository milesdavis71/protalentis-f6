<style type="text/css">
#menu a {
    box-shadow: inset 0 -1px #a2e7f6;
    line-height: 1.3rem;
    padding: 0.3rem 2.5rem 0.3rem 0;
}

#menu .is-active > a {
    background: transparent;
    color: #ffa500;
}

#menu .is-accordion-submenu-parent.is-active > a {
    color: inherit;
}

#menu .nested a {
    padding-left: 1rem;
}
</style>
<p class="text-center">
    <img src="{{root}}assets/img/protalentis_logo.jpg"><br>
    Pro Talentis Universitatis Alapítvány
</p>
<ul id="menu" class="vertical menu accordion-menu" data-accordion-menu>
    {{#each global.pages}}
    <li {{#ifpage page}} class="is-active" {{/ifpage}}>
        {{#if link}}
        <a href="#">{{title}}</a>
        {{else}}
        <a href="{{root}}{{page}}.html">{{title}}</a>
        {{/if}}
        {{> submenu type=menu}}
    </li>
    {{/each}}
</ul>
