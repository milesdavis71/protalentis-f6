<section class="palyazat-preview">
    <div class="grid-x grid-margin-x align-stretch">
        {{#each (filterBy global.palyazatok "active" true)}}
        {{#lt @index 3}}
        <div class="cell small-12 medium-4">
            {{> palyazat_card}}
        </div>
        {{/lt}}
        {{else}}
        <div class="cell small-12">
            <p>Jelenleg nincs elérhető pályázatunk, tekintse meg korábbi pályázatainkat.</p>
        </div>
        {{/each}}
    </div>
</section>
