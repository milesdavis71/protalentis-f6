<button class="news-card card" type="button" data-open="news-modal-{{content}}" aria-controls="news-modal-{{content}}">
    <div class="card-section">
        <h2 class="news-card-title h5">{{title}}</h2>
        <dl class="news-card-meta">
            <div>
                <dt>Létrehozás dátuma</dt>
                <dd>{{#if date}}{{date}}{{else}}Nincs megadva{{/if}}</dd>
            </div>
            <div>
                <dt>Beadási határidő</dt>
                <dd>{{#if deadline}}{{deadline}}{{else}}Nincs megadva{{/if}}</dd>
            </div>
        </dl>
    </div>
</button>
