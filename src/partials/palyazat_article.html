{{> title}}
<article class="card palyazat-article">
  <div class="card-section">
    {{#if image}}
    <div class="palyazat-card-image">
      <img
        src="{{root}}assets/img/palyazat/{{image}}.jpg"
        alt="{{title}}"
        loading="lazy"
      />
    </div>
    {{/if}}
    <div class="{{contentclass}}">{{> content_palyazat_body hir=palyazatKey}}</div>
    {{#if btn_link}}
    <p class="{{classes}}">
      <a
        class="button small"
        href="{{root}}assets/pdf/{{btn_link}}"
        target="_blank"
        >{{btn_title}}</a
      >
    </p>
    {{/if}}
    <p>
      <a href="{{routePath root 'hirek'}}">Vissza a hírekhez</a>
    </p>
  </div>
</article>
